apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-container
        image: dasaribhanu/devops-ci-cd-pipeline:v6
        ports:
        - containerPort: 5000
        env:
        - name: MESSAGE
          valueFrom:
            configMapKeyRef:
              name: flask-config
              key: MESSAGE
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: PASSWORD
